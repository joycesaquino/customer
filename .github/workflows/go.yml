name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: akhileshns/heroku-deploy@v3.12.12
      with:
        heroku_api_key: ${{secrets.HEROKU_API_KEY}}
        heroku_app_name: "we-customer-api"
        heroku_email: "joycesaquino@gmail.com"
        usedocker: true
      env:
        GOOGLE_CLIENT_ID: ${{secrets.GOOGLE_CLIENT_ID}}
        GOOGLE_CLIENT_SECRET: ${{secrets.GOOGLE_CLIENT_SECRET}}
        OAUTH_SECRET: ${{secrets.OAUTH_SECRET}}
        DATABASE_URI: ${{secrets.DATABASE_URI}}
        DATABASE_NAME: ${{secrets.DATABASE_NAME}}
        DATABASE_COLLECTION: ${{secrets.DATABASE_COLLECTION}}
        DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
        DATABASE_USER: ${{secrets.DATABASE_USER}}
        DATABASE_TIMEOUT: ${{secrets.DATABASE_TIMEOUT}}

    - name: Customer API
      uses: actions/setup-go@v2
      with:
        go-version: 1.17

    - name: Build
      run: env GOOS=linux GOARCH=amd64 go build -ldflags "-extldflags '-static'" -o app ./cmd/main.go

    - name: Test
      run: go test -race -v $(go list ./... | grep -v /vendor/) -coverprofile coverage.out; go tool cover -func coverage.out

